<!DOCTYPE html>
<html>
    <head>
        <title>Radar + Routing Viewer</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">

        
    </head>
    <body>
        <div id="topBar">
            <div id="searchBar">
                <div class="search-group">
                    <input id="searchInput" type="text" placeholder="Enter destination..." />
                    <button id="searchGo" onclick="routeToDestination()">Go</button>
                </div>
            </div>
            <div id="navInstruction">
                <i class="fas fa-arrow-up"></i>
                <span id="navText">Next turn: --</span>
            </div>

        </div>

        <div id="instructionPanel" class="instruction-panel">
            <button id="collapseBtn" class="collapse-button">
                <i class="fas fa-chevron-left"></i>
            </button>
            <ol id="instructionList"></ol>
            <button id="endBtn" onclick="clearRoute()" class="corner-close" style="display:none;">
                <i class="fas fa-times"></i>
            </button>

        </div>

        <div id="map"></div>

        <div id="compassContainer">
            <div id="compass"><i class="fas fa-location-arrow"></i></div>
            <!--<button id="toggleRotation">Rotation On</button>!-->
        </div>

        <div id="etaPanel" class="eta-panel">
            ETA: <span id="etaText">Calculating...</span><br>
            Duration Left: <span id="durationText">--</span><br>
            Miles Left: <span id="distanceText">--</span>
        </div>

        <div id="speedLimitSign" class="speed-sign">
            <span id="speedLimitValue">--</span>
            <div class="mph-label">MPH</div>
        </div>




        

        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="radar.js"></script>
        <script src="routing.js"></script>
    </body>
</html>
